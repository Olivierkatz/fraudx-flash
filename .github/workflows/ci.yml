name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  scaffold:
    name: Scaffold build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate local env setup contract
        run: npm run test:setup-env

      - name: Scan for committed secrets
        run: npm run scan:secrets

      - name: Validate deploy assets
        run: npm run test:deploy

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Install Playwright browser
        run: npm --workspace app exec -- playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run test:e2e
