name: Deploy

on:
  workflow_dispatch:
    inputs:
      projectId:
        description: GroundX workspace project id
        required: false
        type: string
      branch:
        description: Branch requested by the workspace runner
        required: false
        type: string
      commitSha:
        description: Commit requested by the workspace runner
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build web UI
    runs-on: ubuntu-latest
    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        if: hashFiles('package.json') != ''
        run: |
          if npm run | grep -qE '^  build$'; then
            npm run build
          else
            echo "No build script found; skipping build."
          fi

      - name: Scaffold placeholder
        if: hashFiles('package.json') == ''
        run: echo "No package.json yet; deploy workflow dispatch is wired."
