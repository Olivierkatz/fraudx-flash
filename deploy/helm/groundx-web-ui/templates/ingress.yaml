{{- if and (eq .Values.publicAccess "ingress") .Values.publicHost }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "groundx-web-ui.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "groundx-web-ui.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  {{- if .Values.ingressClassName }}
  ingressClassName: {{ .Values.ingressClassName }}
  {{- end }}
  {{- if .Values.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.publicHost | quote }}
      secretName: {{ .Values.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.publicHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "groundx-web-ui.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
